<script>
	function validate(){
	   let user=document.getElementById("user").value;
	   let password=document.getElementById("pwd").value;

	if(user===""){
		alert("Please Enter Username.");
		return false;
	}
	if(password===""){

		return false;
	}
	alert("Login Successfully.");

	}
